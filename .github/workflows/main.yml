name: Automated Preprocessing - HOK Reviews

on:
  push:
    branches:
      - main
    paths:
      - 'hok_reviews.csv'
      - 'preprocessing/automate_nofa-firdaus-ananta.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_nofa-firdaus-ananta.py

      - name: Commit and Push Result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add preprocessing/hok_preprocessing.csv

          if ! git diff --staged --quiet; then
            git commit -m "chore: update hok_preprocessing.csv [skip ci]"
            git push
          fi
